<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c0:#000;--c1:#0a0a0a;--c2:#111;--c3:#1c1c1e;--c4:#2c2c2e;--c5:#3a3a3c;
  --t1:rgba(255,255,255,.95);--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.3);--t4:rgba(255,255,255,.1);
  --sep:rgba(255,255,255,.08);--sep2:rgba(255,255,255,.12);
  --p:#7d70f5;--p2:#a599f8;--p3:#5548d4;--pdim:rgba(125,112,245,.14);--pbrd:rgba(125,112,245,.28);
  --g:#34c759;--gdim:rgba(52,199,89,.12);
  --a:#ff9f0a;--adim:rgba(255,159,10,.12);
  --r:#ff3b30;--rdim:rgba(255,59,48,.12);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --font-d:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --tab-h:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--c0);color:var(--t1);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--c5);border-radius:2px}
input,textarea,select,button{font-family:var(--font);-webkit-appearance:none;outline:none}

/* ── SPINNER ── */
.boot-screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--c0)}
.boot-logo{width:72px;height:72px;border-radius:18px;overflow:hidden;box-shadow:0 0 40px rgba(125,112,245,.3)}
.boot-logo img{width:100%;height:100%;object-fit:cover}
.spinner{width:24px;height:24px;border:2.5px solid var(--c4);border-top-color:var(--p);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH ── */
.auth-scene{height:100vh;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--c0)}
.auth-card{width:100%;max-width:360px;background:var(--c2);border:1px solid var(--sep);border-radius:20px;padding:28px 22px;display:flex;flex-direction:column;gap:18px}
.auth-head{display:flex;align-items:center;gap:12px}
.auth-av{width:42px;height:42px;border-radius:11px;overflow:hidden;flex-shrink:0}
.auth-av img{width:100%;height:100%;object-fit:cover}
.auth-title{font-family:var(--font-d);font-size:17px;font-weight:600;letter-spacing:-.2px}
.auth-sub{font-size:12px;color:var(--t3);margin-top:1px}
.seg{display:flex;background:var(--c3);border-radius:10px;padding:2px;gap:2px}
.seg-btn{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;border:none;background:transparent;color:var(--t3);transition:all .15s}
.seg-btn.on{background:var(--c5);color:var(--t1)}
.afield{display:flex;flex-direction:column;gap:5px}
.afield label{font-size:11.5px;font-weight:500;color:var(--t3);letter-spacing:.03em;text-transform:uppercase}
.afi{width:100%;padding:12px 13px;border:1px solid var(--sep);border-radius:11px;background:var(--c3);color:var(--t1);font-size:16px;transition:border-color .15s}
.afi:focus{border-color:var(--p)}
.afi::placeholder{color:var(--t4)}
.roles{display:flex;gap:8px}
.role-opt{flex:1;padding:10px;text-align:center;border-radius:11px;border:1px solid var(--sep);cursor:pointer;font-size:13px;color:var(--t2);background:transparent;transition:all .15s}
.role-opt.on{background:var(--pdim);color:var(--p2);border-color:var(--pbrd)}
.auth-btn{width:100%;padding:13px;border-radius:11px;background:var(--p);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:600;letter-spacing:-.1px;transition:opacity .15s}
.auth-btn:hover{opacity:.86}
.auth-btn:disabled{opacity:.4;cursor:default}
.auth-err{font-size:13px;color:var(--r);background:var(--rdim);border:1px solid rgba(255,59,48,.2);border-radius:10px;padding:10px 12px}
.auth-hint{font-size:12px;color:var(--t3);text-align:center}

/* ══════════════════════════════════
   DESKTOP LAYOUT (≥769px)
══════════════════════════════════ */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* Sidebar — desktop only */
.sidebar{width:280px;min-width:280px;display:flex;flex-direction:column;border-right:1px solid var(--sep);background:var(--c1);overflow:hidden}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--sep);flex-shrink:0}
.sb-brand-row{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.sb-av-sm{width:32px;height:32px;border-radius:8px;overflow:hidden;flex-shrink:0}
.sb-av-sm img{width:100%;height:100%;object-fit:cover}
.sb-brand-name{font-family:var(--font-d);font-size:14px;font-weight:600;letter-spacing:-.1px}

.sb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--sep);flex-shrink:0}
.stat{padding:9px 4px;text-align:center}

.stat-n{font-family:var(--font-d);font-size:19px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-l{font-size:9.5px;color:var(--t3);margin-top:3px;letter-spacing:.05em;text-transform:uppercase}
.stat.sp .stat-n{color:var(--a)}
.stat.sa .stat-n{color:var(--g)}
.stat.sr .stat-n{color:var(--r)}
.sb-tabs{display:flex;border-bottom:1px solid var(--sep);flex-shrink:0}
.sb-tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font)}
.sb-tab.on{color:var(--p2);border-bottom-color:var(--p)}
.filters{display:flex;gap:5px;padding:9px 11px;border-bottom:1px solid var(--sep);overflow-x:auto;flex-shrink:0;scrollbar-width:none}

.fpill{padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--sep);color:var(--t3);background:transparent;white-space:nowrap;font-family:var(--font);transition:all .14s}

.post-list{flex:1;overflow-y:auto;padding:6px}
.pcard{padding:10px 12px;border-radius:11px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .12s}

.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.pc-l{display:flex;align-items:center;gap:6px;min-width:0}
.pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pip-pending{background:var(--a)}.pip-approved{background:var(--g)}.pip-rejected{background:var(--r)}.pip-archived{background:var(--t4)}
.pc-plat{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-time{font-size:10.5px;color:var(--t3);flex-shrink:0}
.pc-cap{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.pc-meta{font-size:10px;color:var(--t3);display:flex;gap:8px}
.sb-foot{padding:10px 13px;border-top:1px solid var(--sep);display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--pdim);border:1px solid var(--pbrd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--p2);flex-shrink:0}
.user-name{font-size:12.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px;margin-top:1px}
.rt-pip{width:5px;height:5px;border-radius:50%;background:var(--g);display:inline-block}
.signout{background:none;border:none;cursor:pointer;color:var(--t3);padding:5px;border-radius:7px;transition:all .12s}
.signout:hover{color:var(--r);background:var(--rdim)}

/* Main panel */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--c0)}
.main-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.topbar{height:48px;padding:0 16px;background:rgba(0,0,0,.8);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:5}
.topbar-menu{display:none;background:none;border:none;cursor:pointer;color:var(--t2);padding:5px;border-radius:7px}
.tb-badges{display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden}
.badge{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:11px;font-size:11px;font-weight:500;white-space:nowrap}
.b-p{background:var(--adim);color:var(--a)}
.b-a{background:var(--gdim);color:var(--g)}
.b-r{background:var(--rdim);color:var(--r)}
.b-n{background:var(--c3);color:var(--t3)}
.b-v{background:var(--pdim);color:var(--p2);border:1px solid var(--pbrd)}
.b-od{background:var(--rdim);color:var(--r);border:1px solid rgba(255,59,48,.3)}
.tb-actions{display:flex;gap:5px;flex-shrink:0}
.tbtn{height:29px;padding:0 11px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--sep);background:transparent;color:var(--t2);font-family:var(--font);transition:all .13s;white-space:nowrap}
.tbtn:hover{background:var(--c3);color:var(--t1)}

.tbtn-app{background:var(--gdim);color:var(--g);border-color:rgba(52,199,89,.25)}

.tbtn-rej{background:var(--rdim);color:var(--r);border-color:rgba(255,59,48,.25)}

.tbtn-edit{background:var(--pdim);color:var(--p2);border-color:var(--pbrd)}
.tbtn-del{color:var(--r)}

.meta-strip{padding:7px 16px;border-bottom:1px solid var(--sep);display:flex;gap:14px;flex-wrap:wrap;background:var(--c1);flex-shrink:0}

.char-strip{padding:5px 16px;border-bottom:1px solid var(--sep);display:flex;gap:10px;flex-wrap:wrap;background:var(--c1);flex-shrink:0}

.c-ok{color:var(--g)}.c-warn{color:var(--a)}.c-ov{color:var(--r)}
.previews{padding:16px;display:flex;gap:16px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.pvpanel{flex:1;min-width:280px;max-width:420px}
.pvlabel{font-size:10px;color:var(--t3);text-align:center;margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase}
.ar-row{display:flex;gap:3px;justify-content:center;margin-bottom:6px;flex-wrap:wrap}
.ar-chip{padding:3px 8px;font-size:10px;border-radius:5px;cursor:pointer;border:1px solid var(--sep);color:var(--t3);background:transparent;font-family:var(--font);transition:all .12s}

.pv-frame{border:1px solid rgba(255,255,255,.1);border-radius:11px;overflow:hidden}
.log-area{padding:10px 16px;border-top:1px solid var(--sep);background:var(--c1);flex-shrink:0}

.log-list{max-height:80px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.log-entry{padding:5px 9px;border-radius:8px;background:var(--c3);font-size:11px;line-height:1.5;display:flex;gap:5px;align-items:flex-start}
.log-who{font-weight:500;color:var(--p2);flex-shrink:0}
.log-sys{color:var(--t3);flex-shrink:0}
.log-body{color:var(--t2);flex:1}
.log-ts{font-size:9.5px;color:var(--t3);flex-shrink:0;margin-left:auto}
.cmt-row{display:flex;gap:7px}
.cmt-input{flex:1;padding:9px 12px;border:1px solid var(--sep);border-radius:10px;background:var(--c3);color:var(--t1);font-size:14px;transition:border-color .15s}
.cmt-input:focus{border-color:var(--p)}
.cmt-input::placeholder{color:var(--t4)}
.cmt-send{padding:9px 16px;border-radius:10px;background:var(--p);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:opacity .15s;white-space:nowrap}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;text-align:center}
.empty-icon{width:50px;height:50px;border-radius:50%;background:var(--pdim);border:1px solid var(--pbrd);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.empty-t{font-family:var(--font-d);font-size:16px;font-weight:600;letter-spacing:-.2px}
.empty-s{font-size:13px;color:var(--t3);max-width:200px;line-height:1.6}

/* Calendar */
.cal-wrap{flex:1;overflow-y:auto;padding:11px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-nav-btn{background:var(--c3);border:1px solid var(--sep);color:var(--t2);border-radius:8px;padding:5px 11px;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .12s}
.cal-nav-btn:hover{color:var(--t1)}
.cal-title{font-size:13px;font-weight:600;letter-spacing:-.1px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:9px;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-day{min-height:48px;border-radius:7px;border:1px solid var(--sep);background:var(--c2);padding:3px 4px}
.cal-day.other{opacity:.22}
.cal-day.today{border-color:var(--pbrd)}
.cal-dn{font-size:9px;color:var(--t3);margin-bottom:2px}
.cal-day.today .cal-dn{color:var(--p2)}
.cal-ev{font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:1px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.ce-p{background:var(--adim);color:var(--a)}.ce-a{background:var(--gdim);color:var(--g)}.ce-r{background:var(--rdim);color:var(--r)}

/* ══════════════════════════════════
   MOBILE LAYOUT (≤768px)
   Full-screen native app feel
══════════════════════════════════ */
@media(max-width:768px){
  /* Hide desktop sidebar */
  .sidebar{display:none!important}

  .app{flex-direction:column}

  /* Mobile nav header */
  .mob-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;padding-top:max(12px,env(safe-area-inset-top,12px));background:rgba(0,0,0,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);flex-shrink:0;position:sticky;top:0;z-index:20}
  .mob-logo{width:28px;height:28px;border-radius:7px;overflow:hidden}
  .mob-logo img{width:100%;height:100%;object-fit:cover}
  .mob-title{font-family:var(--font-d);font-size:16px;font-weight:700;letter-spacing:-.3px}
  .mob-header-actions{display:flex;align-items:center;gap:8px}
  .mob-new-btn{background:var(--p);color:#fff;border:none;cursor:pointer;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:var(--font)}

  /* Main takes full height minus tab bar */
  .main{flex:1;overflow:hidden;padding-bottom:calc(var(--tab-h) + var(--safe-b))}

  /* Hide desktop topbar on mobile */
  .topbar{display:none}

  /* ── MOBILE: LIST VIEW ── */
  .mob-list{flex:1;overflow-y:auto;background:var(--c0);min-height:0}

  /* Mobile stats row */
  .mob-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--sep);margin-bottom:1px;flex-shrink:0}
  .mob-stat{background:var(--c1);padding:10px 8px;text-align:center}
  .mob-stat-n{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1}
  .mob-stat-l{font-size:9px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  .mob-stat.sp .mob-stat-n{color:var(--a)}
  .mob-stat.sa .mob-stat-n{color:var(--g)}
  .mob-stat.sr .mob-stat-n{color:var(--r)}

  /* Mobile filter pills */
  .mob-filters{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--sep);flex-shrink:0}
  .mob-filters::-webkit-scrollbar{display:none}

  /* Mobile post cards — bigger and bolder */
  .mob-post-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:rgba(125,112,245,.1)}
  .mob-post-card:active{background:var(--c2)}
  .mob-card-thumb{width:52px;height:52px;border-radius:10px;background:var(--c3);overflow:hidden;flex-shrink:0;border:1px solid var(--sep2)}
  .mob-card-thumb img{width:100%;height:100%;object-fit:cover}
  .mob-card-thumb-empty{width:52px;height:52px;border-radius:10px;background:var(--c3);flex-shrink:0;border:1px solid var(--sep);display:flex;align-items:center;justify-content:center}
  .mob-card-body{flex:1;min-width:0}
  .mob-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
  .mob-card-plat{font-size:13.5px;font-weight:600;letter-spacing:-.1px}
  .mob-card-status{display:flex;align-items:center;gap:4px}
  .mob-card-cap{font-size:13px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
  .mob-card-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
  .status-tag{display:inline-flex;align-items:center;height:18px;padding:0 8px;border-radius:9px;font-size:10.5px;font-weight:500}
  .st-p{background:var(--adim);color:var(--a)}
  .st-a{background:var(--gdim);color:var(--g)}
  .st-r{background:var(--rdim);color:var(--r)}
  .st-n{background:var(--c3);color:var(--t3)}
  .mob-card-arrow{color:var(--t4);font-size:18px;flex-shrink:0}

  /* ── MOBILE: DETAIL VIEW ── */
  .mob-detail{position:fixed;inset:0;background:var(--c0);z-index:30;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .mob-detail.open{transform:none!important}
  .mob-detail-head{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;padding-top:max(12px,env(safe-area-inset-top,12px));background:rgba(0,0,0,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);flex-shrink:0}
  .mob-back-btn{display:flex;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--p2);font-size:15px;font-weight:500;padding:4px 0;font-family:var(--font)}
  .mob-detail-title{flex:1;text-align:center;font-size:14px;font-weight:600;letter-spacing:-.1px}
  .mob-detail-actions{display:flex;gap:6px}
  .mob-detail-scroll{flex:1;overflow-y:auto;padding-bottom:max(16px,var(--safe-b))}

  /* Mobile approve/reject bar */
  .mob-action-bar{position:sticky;bottom:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);border-top:1px solid var(--sep);padding:10px 16px;padding-bottom:max(10px,var(--safe-b));display:flex;gap:8px;flex-shrink:0}
  .mob-act-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s;letter-spacing:-.1px}
  .mob-act-btn:active{opacity:.7}
  .mob-approve{background:var(--g);color:#000}
  .mob-reject{background:var(--c3);color:var(--r);border:1px solid rgba(255,59,48,.3)}
  .mob-edit{background:var(--c3);color:var(--p2);border:1px solid var(--pbrd)}

  /* Mobile meta info */
  .mob-meta{padding:10px 16px;border-bottom:1px solid var(--sep);background:var(--c1)}
  .mob-meta-row{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t2);margin-bottom:4px}
  .mob-meta-row:last-child{margin-bottom:0}
  .mob-meta-row strong{color:var(--t1);font-weight:500}

  /* Mobile previews — full width stacked */
  .previews{padding:12px;gap:14px;flex-direction:column}
  .pvpanel{min-width:100%;max-width:100%}
  .pvlabel{font-size:10px}

  /* Mobile activity */
  .log-area{padding:12px 16px}
  .log-list{max-height:120px}

  /* Mobile tab bar */
  .mob-tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-b);z-index:25}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:4px 0;border:none;background:none;font-family:var(--font);color:var(--t3);transition:color .15s;-webkit-tap-highlight-color:transparent}
  .mob-tab.on{color:var(--p2)}
  .mob-tab-icon{font-size:20px;line-height:1}
  .mob-tab-label{font-size:9.5px;font-weight:500;letter-spacing:.02em}
  .mob-tab-badge{position:absolute;top:-2px;right:-6px;background:var(--a);color:#000;font-size:9px;font-weight:700;border-radius:10px;padding:0 4px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;margin-top:-3px}
  .mob-tab-icon-wrap{position:relative;display:inline-flex}

  /* ── MOBILE: CALENDAR TAB ── */
  .mob-cal-view{position:absolute;inset:0;bottom:calc(var(--tab-h) + var(--safe-b));overflow-y:auto;display:none;padding:12px}
  .mob-cal-view.show{display:block}

  /* ── HIDE desktop elements on mobile ── */
  .desktop-only{display:none!important}
}

/* Hide mobile elements on desktop */

/* JS adds class 'is-mobile' or 'is-desktop' to body */
body.is-desktop .mob-header,
body.is-desktop .mob-tabbar,
body.is-desktop .mob-list,
body.is-desktop .mob-detail,
body.is-desktop .mob-cal-view{display:none!important}

body.is-mobile .sidebar{display:none!important}
body.is-mobile .topbar{display:none!important}
body.is-mobile .main{overflow:hidden;display:none!important}
body.is-mobile .mob-header{display:flex!important}
body.is-mobile .mob-list{display:flex!important;flex-direction:column}
body.is-mobile .mob-tabbar{display:flex!important}
body.is-mobile .app{flex-direction:column;height:100dvh;position:relative}

/* fallback: hide mob elements until JS runs */
body:not(.is-mobile):not(.is-desktop) .mob-header,
body:not(.is-mobile):not(.is-desktop) .mob-tabbar,
body:not(.is-mobile):not(.is-desktop) .mob-list,
body:not(.is-mobile):not(.is-desktop) .mob-detail,
body:not(.is-mobile):not(.is-desktop) .mob-cal-view{display:none}

/* ══ SHARED: Media carousel ══ */
.car{position:relative;overflow:hidden;background:#000}
.vid-shell{position:relative;width:100%;height:100%}
.vid-shell video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.vid-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.42);cursor:pointer;transition:background .15s}
.vid-cover:hover{background:rgba(0,0,0,.22)}
.vid-cover.gone{display:none}
.play-disc{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center}
.vid-tag{position:absolute;top:9px;left:9px;z-index:3;display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.65);border-radius:10px;padding:2px 8px 2px 6px;font-size:10px;font-weight:500;color:#fff;backdrop-filter:blur(4px)}
.cnt-tag{position:absolute;top:9px;right:9px;z-index:3;background:rgba(0,0,0,.65);border-radius:10px;padding:2px 8px;font-size:10px;color:#fff;font-weight:500;backdrop-filter:blur(4px)}
.car-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:4;background:rgba(0,0,0,.52);border:none;color:#fff;font-size:17px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.car-arrow:hover{background:rgba(0,0,0,.78)}
.car-l{left:8px}.car-r{right:8px}
.car-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:4}
.car-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35)}
.car-dot.on{background:#fff}

/* Image positioner */
.img-mover{position:relative;overflow:hidden;cursor:grab;user-select:none;touch-action:none;background:#000}
.img-mover:active{cursor:grabbing}
.img-mover img{position:absolute;transform-origin:0 0;pointer-events:none;will-change:transform}
.pos-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--c3);border-top:1px solid var(--sep)}
.pos-l{display:flex;align-items:center;gap:5px}
.pos-ic{background:none;border:none;color:var(--t2);cursor:pointer;font-size:14px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:var(--font)}
.pos-ic:hover{background:var(--c4);color:var(--t1)}
.pos-range{width:72px;accent-color:var(--p)}
.pos-pct{font-size:10px;color:var(--t3);min-width:28px}
.pos-reset{font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:var(--font)}
.pos-reset:hover{color:var(--p2)}

/* Social skins */
.ig{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.ig-hd{display:flex;align-items:center;padding:10px 12px;gap:10px}
.ig-av{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0}
.ig-av img{width:100%;height:100%;object-fit:cover}
.ig-av-fallback{width:32px;height:32px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.ig-un{font-size:13px;font-weight:600;flex:1;color:#000}
.ig-un small{display:block;font-size:10px;font-weight:400;color:#8e8e8e}
.ig-acts{padding:9px 12px 3px;display:flex;gap:13px}
.ig-ico{width:20px;height:20px;stroke:#000;fill:none;stroke-width:1.8}
.ig-bm{margin-left:auto}
.ig-lk{padding:0 12px 4px;font-size:12px;font-weight:600;color:#000}
.ig-cap{padding:0 12px 7px;font-size:13px;color:#000;line-height:1.45}
.ig-cap b{font-weight:700}
.ig-cm{padding:0 12px 13px;font-size:11px;color:#8e8e8e}
.fb{background:#fff;font-family:Helvetica,Arial,sans-serif}
.fb-hd{display:flex;align-items:center;padding:11px 14px 7px;gap:9px}
.fb-av{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0}
.fb-av img{width:100%;height:100%;object-fit:cover}
.fb-av-fallback{width:40px;height:40px;border-radius:50%;background:#1877F2;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.fb-nm{font-size:13px;font-weight:700;color:#050505}
.fb-mt{font-size:11px;color:#65676B}
.fb-tx{padding:0 14px 9px;font-size:14px;line-height:1.5;color:#050505}
.fb-rx{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #E4E6EA;border-bottom:1px solid #E4E6EA;margin-top:3px;font-size:12px;color:#65676B}
.fb-ar{display:flex;padding:3px 7px}
.fb-ab{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:600;color:#65676B}
.li{background:#fff;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif}
.li-hd{display:flex;align-items:flex-start;padding:12px 14px 7px;gap:9px}
.li-av{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0}
.li-av img{width:100%;height:100%;object-fit:cover}
.li-av-fallback{width:44px;height:44px;border-radius:50%;background:#0A66C2;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0}
.li-nm{font-size:13px;font-weight:600;color:rgba(0,0,0,.9)}
.li-hl{font-size:11px;color:rgba(0,0,0,.6)}
.li-dt{font-size:11px;color:rgba(0,0,0,.45)}
.li-tx{padding:0 14px 9px;font-size:13px;line-height:1.5;color:rgba(0,0,0,.9)}
.li-rx{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:rgba(0,0,0,.5)}
.li-dv{margin:0 14px;height:.5px;background:#e0e0e0}
.li-ar{display:flex;padding:3px 7px}
.li-ab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;color:rgba(0,0,0,.5)}

/* ══ MODAL ══ */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(12px)}
@media(min-width:600px){.modal-backdrop{align-items:center;padding:20px}}
.modal-sheet{background:var(--c2);border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:94dvh;overflow-y:auto;border:1px solid var(--sep);border-bottom:none}
@media(min-width:600px){.modal-sheet{border-radius:20px;border-bottom:1px solid var(--sep)}}
.modal-pill{width:36px;height:4px;background:var(--c5);border-radius:2px;margin:10px auto 0}
@media(min-width:600px){.modal-pill{display:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.modal-ttl{font-family:var(--font-d);font-size:17px;font-weight:600;letter-spacing:-.2px}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--c4);border:none;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s;font-family:var(--font)}
.modal-close:hover{background:var(--c5);color:var(--t1)}
.modal-body{padding:16px 20px 28px;display:flex;flex-direction:column;gap:14px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.f2{grid-template-columns:1fr}}
.f-lbl{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;display:block}
.f-in{width:100%;padding:11px 13px;border:1px solid var(--sep);border-radius:11px;background:var(--c3);color:var(--t1);font-size:15px;outline:none;transition:border-color .15s}
.f-in:focus{border-color:var(--p)}
.f-in::placeholder{color:var(--t4)}
textarea.f-in{min-height:80px;resize:vertical;line-height:1.5;font-size:14px}
.char-hint{font-size:11px;color:var(--t3);text-align:right;margin-top:3px}
.char-hint.warn{color:var(--a)}.char-hint.over{color:var(--r)}
.plat-row{display:flex;gap:7px;flex-wrap:wrap}
.pp{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--sep);color:var(--t3);background:transparent;user-select:none;font-family:var(--font);transition:all .13s}
.pp.on{background:var(--pdim);color:var(--p2);border-color:var(--pbrd)}
.media-stack{display:flex;flex-direction:column;gap:5px}
.media-item{display:flex;align-items:center;gap:8px;background:var(--c3);border:1px solid var(--sep);border-radius:11px;padding:8px 10px}
.media-item.drag-hl{border-color:var(--p);background:var(--pdim)}
.media-item.dragging{opacity:.3}
.drag-grip{cursor:grab;color:var(--t3);font-size:14px;padding:0 2px;user-select:none;line-height:1}
.drag-grip:active{cursor:grabbing}
.mt-chip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;flex-shrink:0}
.mt-img{background:var(--gdim);color:var(--g)}.mt-vid{background:var(--pdim);color:var(--p2)}
.media-url-txt{flex:1;font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-btn{background:none;border:none;cursor:pointer;color:var(--t3);font-size:12px;padding:0 3px;font-family:var(--font)}
.mv-btn:hover{color:var(--p2)}.mv-btn:disabled{opacity:.2;cursor:default}
.del-btn{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:0 3px;font-family:var(--font)}
.del-btn:hover{color:var(--r)}
.drop-zone{border:1.5px dashed var(--sep);border-radius:11px;padding:18px;text-align:center;cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.drag-hl{border-color:var(--p);background:var(--pdim)}
.dz-icon{font-size:24px;color:var(--t3);margin-bottom:5px}
.dz-txt{font-size:13px;color:var(--t2)}.dz-sub{font-size:11px;color:var(--t3);margin-top:3px}
.upload-prog{font-size:12px;color:var(--t2);padding:3px 0;display:none}
.upload-prog.show{display:block}
.url-row{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap}
.url-row input{flex:1;min-width:100px}
.type-sel{padding:11px 10px;border:1px solid var(--sep);border-radius:11px;background:var(--c3);color:var(--t1);font-size:13px;outline:none;font-family:var(--font)}
.add-url-btn{padding:11px 14px;border-radius:11px;background:var(--c4);color:var(--t2);border:1px solid var(--sep);cursor:pointer;font-size:13px;white-space:nowrap;font-family:var(--font);transition:all .13s}
.add-url-btn:hover{color:var(--p2);border-color:var(--pbrd)}
.submit-btn{width:100%;padding:14px;border-radius:12px;background:var(--p);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:600;font-family:var(--font);letter-spacing:-.1px;margin-top:4px;transition:opacity .15s}
.submit-btn:hover{opacity:.86}
.submit-btn:disabled{opacity:.4;cursor:default}

/* Toast */
.toast{position:fixed;bottom:max(24px,calc(var(--tab-h) + var(--safe-b) + 8px));left:50%;transform:translateX(-50%);background:rgba(28,28,30,.96);backdrop-filter:blur(20px);border:1px solid var(--sep);border-radius:12px;padding:10px 20px;font-size:13.5px;color:var(--t1);z-index:999;animation:tup .2s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;font-weight:500}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

async function boot(){
  if(SB_URL==='YOUR_URL'){renderSetup();return}
  SB=window.supabase.createClient(SB_URL,SB_KEY)
  document.getElementById('root').innerHTML='<div class="boot-screen"><div class="boot-logo"><img src="'+LOGO+'" /></div><div class="spinner"></div></div>'
  var _bt=setTimeout(function(){renderAuth()},6000)
  try{
    const{data:{session}}=await SB.auth.getSession()
    clearTimeout(_bt)
    if(session?.user)await doLogin(session.user)
    else renderAuth()
  }catch(e){clearTimeout(_bt);renderAuth()}
  SB.auth.onAuthStateChange(async(ev,s)=>{
    if(ev==='SIGNED_IN'&&s?.user)await doLogin(s.user)
    else if(ev==='SIGNED_OUT'){me=null;posts=[];sel=null;renderAuth()}
  })
}

async function doLogin(u){
  if(!u||!u.email){renderAuth();return}
  const m=u.user_metadata||{}
  me={id:u.id,email:u.email,name:m.name||u.email.split('@')[0],role:m.role||'creator'}
  renderApp()
  try{await loadPosts()}catch(e){}
  try{startRT()}catch(e){}
  refreshAll()
}

function norm(p){return{...p,platforms:Array.isArray(p.platforms)?p.platforms:[],media:Array.isArray(p.media)?p.media:[],aspect_ratios:p.aspect_ratios||{},post_comments:(p.post_comments||[]).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at))}}

async function loadPosts(){
  const{data,error}=await SB.from('posts').select('*, post_comments(*)').order('created_at',{ascending:false})
  if(!error&&data)posts=data.map(norm)
}

async function savePost(id,d){
  try{
    const{data,error}=await SB.from('posts').update({...d,updated_at:new Date().toISOString()}).eq('id',id).select('*, post_comments(*)').single()
    if(error){console.error('savePost:',JSON.stringify(error));return error}
    if(data){const p=norm(data);const i=posts.findIndex(x=>x.id===id);if(i!==-1)posts[i]=p;if(sel?.id===id)sel=p}
    return null
  }catch(e){return{message:String(e)}}
}

async function createPost(d){
  try{
    const{data,error}=await SB.from('posts').insert([{...d,created_by_name:me.name}]).select('*, post_comments(*)').single()
    if(error){console.error('createPost:',JSON.stringify(error));return error}
    if(data){const p=norm(data);posts.unshift(p);sel=p}
    return null
  }catch(e){return{message:String(e)}}
}

async function logActivity(pid,body,sys){
  const author=sys?'⚙ System':me.name
  const{data}=await SB.from('post_comments').insert([{post_id:pid,author_name:author,body,is_system:!!sys}]).select().single()
  if(data){const p=posts.find(x=>x.id===pid);if(p){p.post_comments=[...(p.post_comments||[]),data];if(sel?.id===pid)sel=p}}
}

function startRT(){
  SB.channel('rt-v5')
    .on('postgres_changes',{event:'*',schema:'public',table:'posts'},async e=>{
      if(e.eventType==='DELETE')return
      const{data}=await SB.from('posts').select('*, post_comments(*)').eq('id',e.new.id).single()
      if(!data)return
      const p=norm(data),i=posts.findIndex(x=>x.id===p.id)
      if(i===-1)posts.unshift(p);else posts[i]=p
      if(sel?.id===p.id)sel=p
      refreshAll()
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'post_comments'},e=>{
      const c=e.new,p=posts.find(x=>x.id===c.post_id)
      if(p&&!p.post_comments?.find(x=>x.id===c.id)){
        p.post_comments=[...(p.post_comments||[]),c].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at))
        if(sel?.id===c.post_id){sel.post_comments=p.post_comments;refreshDetail()}
      }
    })
    .subscribe(s=>{const d=document.getElementById('rt-pip');if(d)d.style.background=s==='SUBSCRIBED'?'var(--g)':'var(--a)'})
}

function toast(msg,ms=2600){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),ms)}

function getAR(p,plat){return(p.aspect_ratios||{})[plat]||DAR[plat]||'1/1'}
function ago(ts){if(!ts)return'';const m=Math.floor((Date.now()-new Date(ts))/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'}
function overdue(p){return p.approval_deadline&&p.status==='pending'&&new Date(p.approval_deadline)<new Date()}
function isMobile(){return document.body.classList.contains('is-mobile')}

function getVidEmbed(url){
  if(!url)return null
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/)
  if(m)return{url:'https://www.youtube.com/embed/'+m[1]+'?rel=0',lbl:'YouTube'}
  m=url.match(/vimeo\.com\/(?:video\/)?([0-9]+)/)
  if(m)return{url:'https://player.vimeo.com/video/'+m[1],lbl:'Vimeo'}
  m=url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?.*id=)([\w-]+)/)
  if(m)return{url:'https://drive.google.com/file/d/'+m[1]+'/preview',lbl:'Drive'}
  return null
}

const SQL=`create table public.posts (
  id uuid primary key default gen_random_uuid(),
  created_at timestamptz default now(), updated_at timestamptz default now(),
  account text default 'Rockit Events', headline text default 'Marketing Manager',
  platforms jsonb default '[]', caption text not null default '',
  media jsonb default '[]', status text default 'pending',
  scheduled_date text, scheduled_time text, approval_deadline text,
  assigned_to text, version int default 1,
  aspect_ratios jsonb default '{}', created_by_name text default ''
);
create table public.post_comments (
  id uuid primary key default gen_random_uuid(),
  created_at timestamptz default now(),
  post_id uuid references public.posts(id) on delete cascade,
  author_name text not null, body text not null, is_system boolean default false
);
alter table public.posts enable row level security;
alter table public.post_comments enable row level security;
create policy "ap" on public.posts for all using (auth.role()='authenticated') with check (auth.role()='authenticated');
create policy "ac" on public.post_comments for all using (auth.role()='authenticated') with check (auth.role()='authenticated');
alter publication supabase_realtime add table public.posts;
alter publication supabase_realtime add table public.post_comments;
insert into storage.buckets(id,name,public) values('post-media','post-media',true) on conflict do nothing;
create policy "up" on storage.objects for insert to authenticated with check(bucket_id='post-media');
create policy "rp" on storage.objects for select to public using(bucket_id='post-media');`

async function doAuth(){
  const email=document.getElementById('a-email')?.value.trim(),pass=document.getElementById('a-pass')?.value
  if(!email||!pass){document.getElementById('a-err').innerHTML='<div class="auth-err">Fill in all fields.</div>';return}
  const btn=document.getElementById('a-btn');btn.disabled=true;btn.textContent='…'
  let error
  if(aTab==='login'){({error}=await SB.auth.signInWithPassword({email,password:pass}))}
  else{
    const name=document.getElementById('a-name')?.value.trim()||email.split('@')[0]
    ;({error}=await SB.auth.signUp({email,password:pass,options:{data:{name,role:aRole}}}))
    if(!error){toast('Account created! Check email then sign in.');renderAuth('login');return}
  }
  if(error){document.getElementById('a-err').innerHTML=`<div class="auth-err">${error.message}</div>`;btn.disabled=false;btn.textContent=aTab==='login'?'Sign in':'Create account'}
}

  return{p:posts.filter(x=>x.status==='pending').length,a:posts.filter(x=>x.status==='approved').length,r:posts.filter(x=>x.status==='rejected').length}
}

function refreshAll(){

}

function doMobFilter(){
  const options=['all','pending','approved','rejected','archived']
  const labels=['All','Pending','Approved','Rejected','Archived']
  const choice=labels[options.indexOf(filter)]
  const next=options[(options.indexOf(filter)+1)%options.length]
  setFilter(next,{classList:{add:()=>{},remove:()=>{}}})
  const pills=document.querySelectorAll('.fpill')
  pills.forEach(p=>p.classList.remove('on'))
  toast('Filter: '+labels[options.indexOf(next)])
  refreshMobList()
}

/* ── CALENDAR ── */
function renderCal(containerId){
  const cw=document.getElementById(containerId);if(!cw)return
  const y=calM.getFullYear(),m=calM.getMonth()
  const mn=calM.toLocaleString('default',{month:'long',year:'numeric'})
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate()
  const today=new Date(),cells=[]
  for(let i=fd-1;i>=0;i--)cells.push({d:dip-i,cur:false})
  for(let d=1;d<=dim;d++)cells.push({d,cur:true})
  while(cells.length%7!==0)cells.push({d:cells.length-fd-dim+1,cur:false})
  const pfd=(d,cur)=>!cur?[]:posts.filter(p=>{if(!p.scheduled_date||p.status==='archived')return false;try{const pd=new Date(p.scheduled_date);return!isNaN(pd)&&pd.getFullYear()===y&&pd.getMonth()===m&&pd.getDate()===d}catch{return false}})
  cw.innerHTML=`<div class="cal-nav"><button class="cal-nav-btn" onclick="calM.setMonth(calM.getMonth()-1);renderCal('${containerId}')">‹</button><span class="cal-title">${mn}</span><button class="cal-nav-btn" onclick="calM.setMonth(calM.getMonth()+1);renderCal('${containerId}')">›</button></div>
  <div class="cal-grid">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells.map(({d,cur})=>{
    const isT=cur&&today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d
    const dp=pfd(d,cur)
    return`<div class="cal-day${!cur?' other':''}${isT?' today':''}"><div class="cal-dn">${d}</div>${dp.map(p=>`<div class="cal-ev ce-${p.status[0]}" onclick="pickPost('${p.id}')">${(p.platforms||[]).map(x=>({instagram:'IG',facebook:'FB',linkedin:'LI'}[x]||'').slice(0,2)).join(' ')} ${p.caption.slice(0,10)}…</div>`).join('')}</div>`
  }).join('')}</div>`
}

/* ── PREVIEWS ── */
function getCI(pid,plat){return(carIdx[pid]||{})[plat]||0}
function setCI(pid,plat,v){if(!carIdx[pid])carIdx[pid]={};carIdx[pid][plat]=v}
function carNav(pid,plat,dir){
  const p=posts.find(x=>x.id===pid);if(!p?.media?.length)return
  let i=getCI(pid,plat);i=(i+dir+p.media.length)%p.media.length;setCI(pid,plat,i)
  const pv=document.getElementById('pv-area');if(pv)pv.innerHTML=(p.platforms||[]).map(pl=>renderPrev(pl,p)).join('')
  if(isMobile())refreshDetail()
}
function playVid(uid){const v=document.getElementById(uid),ov=document.getElementById('ov_'+uid);if(!v)return;ov?.classList.add('gone');v.controls=true;v.play()}

function renderMedia(media,pid,plat){
  const p2=posts.find(x=>x.id===pid)||sel||{},ar=getAR(p2,plat),maxH=ar==='9/16'?'420px':'none'
  if(!media?.length)return`<div style="aspect-ratio:${ar};max-height:${maxH};background:#111;display:flex;align-items:center;justify-content:center"><span style="font-size:12px;color:var(--t3)">No media</span></div>`
  const idx=getCI(pid,plat),total=media.length,item=media[idx],uid=`v_${pid}_${plat}_${idx}`
  let slide
  if(item.type==='video'){
    const emb=getVidEmbed(item.url)
    if(emb)slide=`<div style="position:relative;width:100%;height:100%;background:#000"><iframe src="${emb.url}" style="width:100%;height:100%;border:none;display:block" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen loading="lazy"></iframe><div class="vid-tag">${emb.lbl}</div></div>`
    else slide=`<div class="vid-shell"><video id="${uid}" src="${item.url}" playsinline preload="metadata" style="width:100%;height:100%;object-fit:contain;background:#000"></video><div class="vid-cover" id="ov_${uid}" onclick="playVid('${uid}')"><div class="play-disc"><svg width="16" height="18" viewBox="0 0 16 18" fill="#000"><polygon points="2,1 14,9 2,17"/></svg></div></div><div class="vid-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>Video</div></div>`
  } else {
    if(editMode){
      const pk=pid+'_'+plat+'_'+idx
      if(!imgPos[pk])imgPos[pk]={x:0,y:0,s:1}
      const pos=imgPos[pk]
      slide=`<div class="img-mover" id="im_${pk}" style="width:100%;height:100%" onmousedown="startDrag(event,'${pk}')" ontouchstart="startDragT(event,'${pk}')"><img id="img_${pk}" src="${item.url}" style="width:${Math.round(pos.s*100)}%;height:auto;min-height:100%;transform:translate(${pos.x}px,${pos.y}px)" onerror="this.style.opacity=.1" onload="initImg('${pk}')" /></div>
      <div class="pos-bar"><div class="pos-l"><button class="pos-ic" onclick="zoomI('${pk}',-0.1)">−</button><input class="pos-range" type="range" min="1" max="3" step="0.05" value="${pos.s}" oninput="setZ('${pk}',parseFloat(this.value))" /><button class="pos-ic" onclick="zoomI('${pk}',0.1)">+</button><span class="pos-pct">${Math.round(pos.s*100)}%</span></div><button class="pos-reset" onclick="resetI('${pk}')">Reset</button></div>`
    } else {
      slide=`<img src="${item.url}" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none" onerror="this.style.opacity=.1" />`
    }
  }
  const prev=total>1?`<button class="car-arrow car-l" onclick="carNav('${pid}','${plat}',-1)">‹</button>`:''
  const next=total>1?`<button class="car-arrow car-r" onclick="carNav('${pid}','${plat}',1)">›</button>`:''
  const dots=total>1?`<div class="car-dots">${media.map((_,i)=>`<div class="car-dot${i===idx?' on':''}"></div>`).join('')}</div>`:''
  const cnt=total>1&&item.type!=='video'?`<div class="cnt-tag">${idx+1}/${total}</div>`:''
  return`<div class="car" style="aspect-ratio:${ar};max-height:${maxH}">${slide}${prev}${next}${dots}${cnt}</div>`
}

  } else if(plat==='linkedin'){
    card=`<div class="li">
      <div class="li-hd">
        <div class="li-av"><img src="${LOGO}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="li-av-fallback" style="display:none">${ini(acc)}</div></div>
        <div><div class="li-nm">Rockit Event Production</div><div class="li-hl">${p.headline||'Event Production'}</div><div class="li-dt">${p.scheduled_date||'Scheduled'} · Public</div></div>
      </div>
      <div class="li-tx">${p.caption}</div>
      ${(p.media||[]).length?media:''}
      <div class="li-rx"><span>Like · Celebrate · Insightful &nbsp;1,482</span><span>63 comments</span></div>
      <div class="li-dv"></div>

function setAR(pid,plat,ar){
  const p=posts.find(x=>x.id===pid);if(!p)return
  if(!p.aspect_ratios)p.aspect_ratios={};p.aspect_ratios[plat]=ar
  if(sel?.id===pid)sel.aspect_ratios=p.aspect_ratios
  const pv=document.getElementById('pv-area');if(pv&&sel)pv.innerHTML=(sel.platforms||[]).map(pl=>renderPrev(pl,sel)).join('')
  if(isMobile())refreshDetail()
}

/* ── IMAGE POSITIONING ── */
function getP(k){return imgPos[k]||(imgPos[k]={x:0,y:0,s:1})}
function initImg(k){const c=document.getElementById('im_'+k),img=document.getElementById('img_'+k);if(!c||!img)return;const cw=c.offsetWidth,ch=c.offsetHeight,iw=img.naturalWidth,ih=img.naturalHeight;if(!cw||!ch||!iw||!ih)return;const pos=getP(k);if(pos.s===1){pos.s=Math.max(1,Math.max(cw/iw,ch/ih));pos.x=(cw-iw*pos.s)/2;pos.y=(ch-ih*pos.s)/2;applyP(k)}}
function applyP(k){const img=document.getElementById('img_'+k),sl=document.querySelector(`input[oninput*="${k}"]`),pct=sl?.nextElementSibling,pos=getP(k);if(img){img.style.transform=`translate(${Math.round(pos.x)}px,${Math.round(pos.y)}px)`;img.style.width=Math.round(pos.s*100)+'%'};if(sl)sl.value=pos.s;if(pct)pct.textContent=Math.round(pos.s*100)+'%'}
function clampP(k){const c=document.getElementById('im_'+k),img=document.getElementById('img_'+k);if(!c||!img)return;const pos=getP(k),cw=c.offsetWidth,ch=c.offsetHeight,iw=img.naturalWidth*pos.s,ih=img.naturalHeight*pos.s;pos.x=Math.max(Math.min(0,cw-iw),Math.min(0,pos.x));pos.y=Math.max(Math.min(0,ch-ih),Math.min(0,pos.y))}
function setZ(k,v){const pos=getP(k),c=document.getElementById('im_'+k),img=document.getElementById('img_'+k);if(!c||!img)return;pos.s=Math.max(Math.max(c.offsetWidth/(img.naturalWidth||1),c.offsetHeight/(img.naturalHeight||1)),Math.min(3,v));clampP(k);applyP(k)}
function zoomI(k,d){setZ(k,getP(k).s+d)}
function resetI(k){imgPos[k]={x:0,y:0,s:1};setTimeout(()=>initImg(k),30)}
function startDrag(e,k){if(e.button!==0)return;e.preventDefault();const pos=getP(k);mouseD={k,sx:e.clientX-pos.x,sy:e.clientY-pos.y};const mv=ev=>{if(!mouseD)return;const p=getP(mouseD.k);p.x=ev.clientX-mouseD.sx;p.y=ev.clientY-mouseD.sy;clampP(mouseD.k);applyP(mouseD.k)};const up=()=>{mouseD=null;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up)};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)}
function startDragT(e,k){if(e.touches.length!==1)return;e.preventDefault();const pos=getP(k),t=e.touches[0];touchD={k,sx:t.clientX-pos.x,sy:t.clientY-pos.y};const mv=ev=>{if(!touchD||!ev.touches[0])return;const p=getP(touchD.k);p.x=ev.touches[0].clientX-touchD.sx;p.y=ev.touches[0].clientY-touchD.sy;clampP(touchD.k);applyP(touchD.k)};const up=()=>{touchD=null;document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up)};document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up)}
document.addEventListener('wheel',e=>{if(!editMode)return;const el=e.target.closest('.img-mover');if(!el)return;e.preventDefault();setZ(el.id.replace('im_',''),getP(el.id.replace('im_','')).s+(e.deltaY>0?-.05:.05))},{passive:false})

/* ── ACTIONS ── */
async function doApprove(){if(!sel)return;const e=await savePost(sel.id,{status:'approved'});if(e)alert('Error: '+e.message);else{await logActivity(sel.id,'Post approved ✓',true);toast('Approved ✓');refreshAll();if(isMobile())closeMobDetail()}}
async function doReject(){if(!sel)return;const e=await savePost(sel.id,{status:'rejected'});if(e)alert('Error: '+e.message);else{await logActivity(sel.id,'Changes requested.',true);toast('Changes requested');refreshAll();if(isMobile())closeMobDetail()}}
async function doArchive(){if(!sel)return;const ns=sel.status==='archived'?'pending':'archived';const e=await savePost(sel.id,{status:ns});if(e)alert('Error: '+e.message);else{await logActivity(sel.id,ns==='archived'?'Archived.':'Unarchived.',true);toast(ns==='archived'?'Archived':'Unarchived');refreshAll()}}
async function doDelete(){if(!sel||!confirm('Permanently delete this post?'))return;try{const{error}=await SB.from('posts').delete().eq('id',sel.id);if(error){alert('Error: '+error.message);return}posts=posts.filter(p=>p.id!==sel.id);sel=null;toast('Deleted');refreshAll()}catch(e){alert('Error: '+e.message)}}

async function sendCmt(mob=false){
  const id=mob?'mob-cmt-in':'desk-cmt-in'
  const fi=document.getElementById(id)
  if(!fi?.value.trim()||!sel)return
  const body=fi.value.trim();fi.value=''
  await logActivity(sel.id,body,false)
  if(mob)refreshDetail();else refreshDesktopMain()
}

/* ── MODAL ── */
function openModal(eid){
  editId=eid||null;editMode=true
  const ex=eid?posts.find(p=>p.id===eid):null
  mMedia=ex?JSON.parse(JSON.stringify(ex.media||[])):[]
  mPlats=ex?[...(ex.platforms||['instagram'])]:['instagram']
  const bg=document.createElement('div');bg.className='modal-backdrop';bg.id='m-bg'
  bg.innerHTML=`<div class="modal-sheet">
    <div class="modal-pill"></div>
    <div class="modal-hd"><span class="modal-ttl">${ex?'Edit post':'New post'}</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div><div class="f-lbl">Platforms</div><div class="plat-row"><span class="pp${mPlats.includes('instagram')?' on':''}" data-p="instagram" onclick="togglePP(this)">Instagram</span><span class="pp${mPlats.includes('facebook')?' on':''}" data-p="facebook" onclick="togglePP(this)">Facebook</span><span class="pp${mPlats.includes('linkedin')?' on':''}" data-p="linkedin" onclick="togglePP(this)">LinkedIn</span></div></div>
      <div class="f2">
        <div><div class="f-lbl">Account name</div><input class="f-in" type="text" id="m-acc" value="${ex?.account||'Rockit Events'}" /></div>
        <div><div class="f-lbl">LinkedIn headline</div><input class="f-in" type="text" id="m-hl" value="${ex?.headline||'Event Production'}" /></div>
      </div>
      <div><div class="f-lbl">Caption</div><textarea class="f-in" id="m-cap" oninput="updateCC()">${ex?.caption||''}</textarea><div class="char-hint" id="cc"></div></div>
      <div>
        <div class="f-lbl">Media</div>
        <div class="media-stack" id="m-ml"></div>
        <div class="drop-zone" id="dz" onclick="document.getElementById('fp').click()" ondragover="event.preventDefault();this.classList.add('drag-hl')" ondragleave="this.classList.remove('drag-hl')" ondrop="this.classList.remove('drag-hl');handleFiles(event.dataTransfer.files)">
          <div class="dz-icon">↑</div><div class="dz-txt">Upload photos or videos</div><div class="dz-sub">Click to browse or drag & drop</div>
        </div>
        <input type="file" id="fp" multiple accept="image/*,video/*" style="display:none" onchange="handleFiles(this.files)" />
        <div class="upload-prog" id="up-p"></div>
        <div class="url-row"><select class="type-sel" id="m-type"><option value="image">Image</option><option value="video">Video</option></select><input class="f-in" type="text" id="m-url" placeholder="Or paste YouTube, Vimeo, Drive URL…" /><button class="add-url-btn" onclick="addURL()">Add</button></div>
      </div>
      <div class="f2">
        <div><div class="f-lbl">Scheduled date</div><input class="f-in" type="text" id="m-dt" value="${ex?.scheduled_date||''}" placeholder="Apr 20, 2026" /></div>
        <div><div class="f-lbl">Time</div><input class="f-in" type="text" id="m-time" value="${ex?.scheduled_time||''}" placeholder="10:00 AM" /></div>
      </div>
      <div class="f2">
        <div><div class="f-lbl">Approval deadline</div><input class="f-in" type="text" id="m-dl" value="${ex?.approval_deadline||''}" placeholder="Apr 18, 2026" /></div>
        <div><div class="f-lbl">Assign to</div><input class="f-in" type="text" id="m-assign" value="${ex?.assigned_to||''}" placeholder="Team member…" /></div>
      </div>
      <button class="submit-btn" id="m-sub" onclick="submitPost()">${ex?'Save changes':'Submit for approval'}</button>
    </div>
  </div>`
  document.body.appendChild(bg)
  renderMML();setTimeout(()=>{updateCC();document.getElementById('m-cap')?.focus()},60)
}

function updateCC(){
  const cap=document.getElementById('m-cap')?.value||'',el=document.getElementById('cc');if(!el)return
  const len=cap.length,lim=Math.min(...mPlats.map(p=>CHAR[p]||99999))
  el.textContent=`${len} / ${lim} characters`;el.className='char-hint'+(len>lim?' over':len>lim*.9?' warn':'')
}

function renderMML(){
  const el=document.getElementById('m-ml');if(!el)return
  if(!mMedia.length){el.innerHTML='';return}
  el.innerHTML=mMedia.map((m,i)=>`<div class="media-item" draggable="true" ondragstart="dragIdx=${i};this.classList.add('dragging')" ondragover="event.preventDefault();if(${i}!==dragIdx)this.classList.add('drag-hl')" ondragleave="this.classList.remove('drag-hl')" ondrop="event.preventDefault();this.classList.remove('drag-hl','dragging');const mv=mMedia.splice(dragIdx,1)[0];mMedia.splice(${i},0,mv);dragIdx=null;renderMML()" ondragend="document.querySelectorAll('.media-item').forEach(x=>x.classList.remove('dragging','drag-hl'))" id="mi_${i}">
    <span class="drag-grip">⠿</span>
    <span class="mt-chip ${m.type==='video'?'mt-vid':'mt-img'}">${m.type==='video'?'Vid':'Img'}</span>
    <span class="media-url-txt">${m.url}</span>
    <button class="mv-btn" onclick="if(${i}>0){const t=mMedia[${i}];mMedia[${i}]=mMedia[${i}-1];mMedia[${i}-1]=t;renderMML()}" ${i===0?'disabled':''}>↑</button>
    <button class="mv-btn" onclick="if(${i}<mMedia.length-1){const t=mMedia[${i}];mMedia[${i}]=mMedia[${i}+1];mMedia[${i}+1]=t;renderMML()}" ${i===mMedia.length-1?'disabled':''}>↓</button>
    <button class="del-btn" onclick="mMedia.splice(${i},1);renderMML()">×</button>
  </div>`).join('')
}

function addURL(){
  const url=document.getElementById('m-url')?.value.trim();let type=document.getElementById('m-type')?.value||'image'
  if(!url){toast('Paste a URL first');return}
  if(url.startsWith('blob:')||url.startsWith('data:')){alert('Use the upload button to pick files from your PC.');return}
  if(getVidEmbed(url)||/\.(mp4|mov|webm|avi|m4v)$/i.test(url))type='video'
  mMedia.push({type,url});document.getElementById('m-url').value='';renderMML()
}

async function handleFiles(files){
  if(!files?.length)return
  const prog=document.getElementById('up-p')
  const sp=(msg,col)=>{if(!prog)return;prog.style.display='block';prog.style.color=col||'var(--t2)';prog.textContent=msg}
  sp('Starting upload…')
  let done=0,failed=0
  for(const file of files){
    try{
      const isVid=file.type.startsWith('video/')||/\.(mp4|mov|avi|webm|mkv|m4v)$/i.test(file.name)
      const mb=(file.size/1024/1024).toFixed(1)
      if(isVid&&file.size>50*1024*1024){failed++;toast(`${file.name} is ${mb}MB — videos must be under 50MB. Use YouTube or Drive instead.`,5000);continue}
      sp(`Uploading ${file.name} (${mb}MB)…`)
      const path=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_')
      const{data,error}=await SB.storage.from('post-media').upload(path,file,{cacheControl:'3600',upsert:true,contentType:file.type||'application/octet-stream'})
      if(error){failed++;sp('Upload failed: '+(error.message||JSON.stringify(error)),'var(--r)');alert('Upload failed: '+(error.message||JSON.stringify(error)));continue}
      const{data:ud}=SB.storage.from('post-media').getPublicUrl(path)
      if(!ud?.publicUrl){failed++;continue}
      mMedia.push({type:isVid?'video':'image',url:ud.publicUrl});done++
    }catch(e){failed++;sp('Error: '+e.message,'var(--r)');alert('Upload error: '+e.message)}
  }
  sp(done+' uploaded'+(failed?' · '+failed+' failed':''),failed?'var(--a)':'var(--g)')
  setTimeout(()=>{if(prog)prog.style.display='none'},4000)
  renderMML()
}

function closeModal(){editMode=false;document.getElementById('m-bg')?.remove()}

function togglePP(el){
  const p=el.dataset.p
  if(el.classList.contains('on')){if(mPlats.length===1)return;el.classList.remove('on');mPlats=mPlats.filter(x=>x!==p)}
  else{el.classList.add('on');mPlats.push(p)}
  setTimeout(updateCC,10)
}

async function submitPost(){
  console.log('submitPost fired, editId:', editId, 'mPlats:', mPlats)
  const cap=document.getElementById('m-cap')?.value.trim();if(!cap){toast('Add a caption');return}
  const acc=document.getElementById('m-acc')?.value.trim()||'Rockit Events'
  const hl=document.getElementById('m-hl')?.value.trim()||'Event Production'
  const dt=document.getElementById('m-dt')?.value.trim()||''
  const tm=document.getElementById('m-time')?.value.trim()||''
  const dl=document.getElementById('m-dl')?.value.trim()||''
  const assign=document.getElementById('m-assign')?.value.trim()||''
  const sub=document.getElementById('m-sub');if(sub){sub.disabled=true;sub.textContent='Saving…'}
  const base={account:acc,headline:hl,platforms:[...mPlats],caption:cap,media:JSON.parse(JSON.stringify(mMedia)),scheduled_date:dt,status:'pending'}
  if(tm)base.scheduled_time=tm;if(dl)base.approval_deadline=dl;if(assign)base.assigned_to=assign
  console.log('Sending data:', JSON.stringify(base))
  let err
  if(editId){
    const ex=posts.find(p=>p.id===editId),nv=(ex?.version||1)+1
    err=await savePost(editId,{...base,version:nv})
    if(!err){await logActivity(editId,'Updated to v'+nv+' — reset to pending.',true);toast('Saved as v'+nv)}
  } else {
    err=await createPost({...base,version:1,aspect_ratios:{}})
    if(!err)toast('Submitted for approval ✓')
  }
  console.log('Save result:', err)
  if(err){
    const msg=err.message||err.details||err.hint||JSON.stringify(err)
    alert('Save failed:\n\n'+msg)
    if(sub){sub.disabled=false;sub.textContent=editId?'Save changes':'Submit for approval'}
  } else {
    closeModal();refreshAll()
  }
}
